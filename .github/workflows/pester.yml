name: Pester Tests & Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Permissions required for test-reporter (checks write) and PR summary (pull-requests write)
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  pester:
    name: Run Pester Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Pester using Windows PowerShell 5.1 (matches the script's minimum requirement)
      - name: Install Pester
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -SkipPublisherCheck

      # Ensure the coverage output directory exists before Pester tries to write to it
      - name: Create coverage directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path coverage | Out-Null

      # Run tests with code coverage using New-PesterConfiguration (Pester v5 recommended approach)
      - name: Run Pester tests with code coverage
        shell: powershell
        env:
          TEST_MODE: "1"
        run: |
          $config = New-PesterConfiguration

          # Test execution
          $config.Run.Path     = ".\tests"
          $config.Run.PassThru = $true

          # Code coverage — scoped to the single production script
          $config.CodeCoverage.Enabled      = $true
          $config.CodeCoverage.Path         = ".\entra-id-pre-provision-keys-onespan-fx7.ps1"
          $config.CodeCoverage.OutputFormat = "JaCoCo"
          $config.CodeCoverage.OutputPath   = "coverage\coverage.xml"

          # Test result report (JUnit XML consumed by dorny/test-reporter)
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputFormat = "JUnitXml"
          $config.TestResult.OutputPath   = "test-results.xml"

          $config.Output.Verbosity = "Normal"

          $results = Invoke-Pester -Configuration $config

          if ($results.FailedCount -gt 0) {
            Write-Error "Pester: $($results.FailedCount) test(s) failed." -ErrorAction Continue
            exit 1
          }

          # Enforce coverage threshold directly from Pester's result object.
          # This avoids needing a separate Linux job and Docker-based tools.
          $warnThreshold = 70
          $failThreshold = 90
          $pct = [Math]::Round($results.CodeCoverage.CoveragePercent, 2)
          $covered = $results.CodeCoverage.CommandsExecutedCount
          $total   = $results.CodeCoverage.CommandsAnalyzedCount

          $indicator = if ($pct -ge $failThreshold) { "✅" } elseif ($pct -ge $warnThreshold) { "⚠️" } else { "❌" }
          $summary = "$indicator Line coverage: **$pct%** ($covered / $total commands)"

          # Write to the GitHub Actions job summary
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          if ($pct -lt $failThreshold) {
            Write-Error "Coverage $pct% is below the required $failThreshold% threshold." -ErrorAction Continue
            exit 1
          }

          if ($pct -lt $warnThreshold) {
            Write-Warning "Coverage $pct% is below the warning threshold of $warnThreshold%."
          }

      # Publish test results to the Checks tab on the PR / commit
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pester Test Results
          path: test-results.xml
          reporter: java-junit

      # Upload coverage XML and JUnit XML as workflow artifacts (retained 30 days)
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-test-artifacts
          path: |
            coverage/coverage.xml
            test-results.xml
          retention-days: 30

          path: code-coverage-results.md
